<section class="main-layout" [class.main-layout--sidebar-collapsed]="isSidebarCollapsed()">
  <app-navbar
    [isSidebarCollapsed]="isSidebarCollapsed()"
    [isSidebarOpen]="isSidebarOpen()"
    (menuToggle)="toggleSidebar()"
  />

  <div class="main-layout__body">
    <button
      class="main-layout__overlay"
      type="button"
      aria-label="Cerrar menú de navegación"
      [class.main-layout__overlay--visible]="isSidebarOpen()"
      (click)="closeSidebar()"
    ></button>

    <app-sidebar
      class="main-layout__sidebar"
      [class.main-layout__sidebar--open]="isSidebarOpen()"
      [class.main-layout__sidebar--collapsed]="isSidebarCollapsed()"
      [collapsed]="isSidebarCollapsed()"
      (navSelected)="closeSidebar()"
    />

    <main class="main-layout__content">
      <router-outlet />
    </main>
  </div>
</section>
