<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__section">
    <div class="sidebar__header">
      <p class="sidebar__label">Navegaci&oacute;n</p>

      <button
        class="sidebar__close-button"
        mat-icon-button
        type="button"
        aria-label="Cerrar men&uacute; de navegaci&oacute;n"
        (click)="navSelected.emit()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <nav class="sidebar__nav" aria-label="Navegaci&oacute;n principal">
      <a
        routerLink="/dashboard"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>dashboard</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Dashboard</span>
        </span>
      </a>

      <a
        routerLink="/patients"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>groups</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Pacientes</span>
        </span>
      </a>

      <a
        routerLink="/appointments"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>event</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Citas</span>
        </span>
      </a>

      <a
        routerLink="/financial-transactions"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>payments</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Finanzas</span>
        </span>
      </a>

      <a
        routerLink="/case-files"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>folder_shared</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Expedientes</span>
        </span>
      </a>

      <a
        routerLink="/documents"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>description</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Documentos</span>
        </span>
      </a>
    </nav>
  </div>
</aside>
