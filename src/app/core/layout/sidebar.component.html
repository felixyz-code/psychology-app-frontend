<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__section">
    <p class="sidebar__label">Navegación</p>

    <nav class="sidebar__nav" aria-label="Navegación principal">
      <a
        routerLink="/dashboard"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>dashboard</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Dashboard</span>
        </span>
      </a>

      <a
        routerLink="/patients"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>groups</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Pacientes</span>
        </span>
      </a>

      <a
        routerLink="/appointments"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
        (click)="navSelected.emit()"
      >
        <mat-icon>event</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Citas</span>
        </span>
      </a>

      <div class="sidebar__link sidebar__link--disabled" aria-disabled="true">
        <mat-icon>folder_shared</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Expedientes</span>
          <span class="sidebar__meta">Próximamente</span>
        </span>
      </div>

      <div class="sidebar__link sidebar__link--disabled" aria-disabled="true">
        <mat-icon>description</mat-icon>
        <span class="sidebar__content">
          <span class="sidebar__title">Documentos</span>
          <span class="sidebar__meta">Próximamente</span>
        </span>
      </div>
    </nav>
  </div>
</aside>
