<aside class="sidebar">
  <div class="sidebar__section">
    <p class="sidebar__label">Navegación</p>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a
        mat-list-item
        routerLink="/patients"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
      >
        <mat-icon matListItemIcon>groups</mat-icon>
        <span matListItemTitle>Pacientes</span>
      </a>

      <div mat-list-item class="sidebar__link sidebar__link--disabled">
        <mat-icon matListItemIcon>folder_shared</mat-icon>
        <span matListItemTitle>Expedientes</span>
        <span matListItemLine>Próximamente</span>
      </div>

      <div mat-list-item class="sidebar__link sidebar__link--disabled">
        <mat-icon matListItemIcon>description</mat-icon>
        <span matListItemTitle>Documentos</span>
        <span matListItemLine>Próximamente</span>
      </div>

      <a
        mat-list-item
        routerLink="/appointments"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
      >
        <mat-icon matListItemIcon>event</mat-icon>
        <span matListItemTitle>Citas</span>
      </a>
    </mat-nav-list>
  </div>
</aside>
