<div class="patient-delete-dialog app-dialog">
  <div class="patient-delete-dialog__header app-dialog__header">
    <h2>Eliminar paciente</h2>
    <p>Confirma si deseas eliminar este paciente del módulo de Pacientes.</p>
  </div>

  <div class="patient-delete-dialog__summary app-dialog__summary">
    <p class="patient-delete-dialog__summary-title app-dialog__summary-title">Paciente seleccionado</p>
    <p class="patient-delete-dialog__name">{{ getFullName() }}</p>
  </div>

  <p class="patient-delete-dialog__warning">
    Esta acción no puede deshacerse y puede afectar la visualización de información asociada dentro del flujo clínico.
  </p>

  @if (errorMessage()) {
    <p class="patient-delete-dialog__error" role="alert">{{ errorMessage() }}</p>
  }

  <div class="patient-delete-dialog__actions">
    <button mat-button type="button" cdkFocusInitial [disabled]="isDeleting()" (click)="cancel()">Cancelar</button>

    <button
      mat-flat-button
      type="button"
      class="patient-delete-dialog__confirm app-dialog__danger"
      [disabled]="isDeleting()"
      (click)="confirmDelete()"
    >
      @if (isDeleting()) {
        <mat-spinner diameter="20" />
        <span>Eliminando...</span>
      } @else {
        <span>Eliminar paciente</span>
      }
    </button>
  </div>
</div>
