<div class="session-note-detail-dialog">
  <header class="session-note-detail-dialog__header">
    <div class="session-note-detail-dialog__header-copy">
      <span class="session-note-detail-dialog__eyebrow">Nota de sesion</span>
      <h2>{{ getTitle() }}</h2>
      <p>Lectura clinica construida con el contrato actual disponible para Session Notes.</p>

      <div class="session-note-detail-dialog__meta">
        <span>{{ sessionNote.sessionDate | date: 'dd/MM/yyyy HH:mm' }}</span>
        <span>Autor: {{ sessionNote.authorId }}</span>
        <span>Expediente: {{ sessionNote.caseFileId }}</span>
      </div>
    </div>

    <button mat-icon-button type="button" aria-label="Cerrar nota de sesion" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="session-note-detail-dialog__body">
    <app-session-note-workspace
      [sessionNote]="sessionNote"
      [showActions]="false"
    />
  </div>

  <footer class="session-note-detail-dialog__footer">
    <button mat-button class="app-secondary-button" type="button" (click)="close()">Cerrar</button>
    <button mat-flat-button type="button" (click)="edit()">Editar</button>
  </footer>
</div>
