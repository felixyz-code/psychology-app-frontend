<div class="session-note-delete-dialog">
  <h2>Eliminar nota de sesi&oacute;n</h2>

  <p>&iquest;Est&aacute; seguro que desea eliminar esta nota de sesi&oacute;n?</p>

  <div class="session-note-delete-dialog__summary">
    <p class="session-note-delete-dialog__title">
      "{{ sessionNote.title || 'Sesión sin título' }}"
    </p>
    <p>{{ sessionNote.sessionDate | date: 'dd/MM/yyyy HH:mm' }}</p>
  </div>

  @if (errorMessage()) {
    <p class="session-note-delete-dialog__error" role="alert">{{ errorMessage() }}</p>
  }

  <div class="session-note-delete-dialog__actions">
    <button mat-button type="button" [disabled]="isDeleting()" (click)="cancel()">Cancelar</button>

    <button mat-flat-button type="button" [disabled]="isDeleting()" (click)="confirmDelete()">
      @if (isDeleting()) {
        <mat-spinner diameter="20" />
        <span>Eliminando...</span>
      } @else {
        <span>Eliminar</span>
      }
    </button>
  </div>
</div>
