<div class="financial-transaction-detail-dialog app-dialog">
  <header class="financial-transaction-detail-dialog__header app-dialog__header">
    <div class="financial-transaction-detail-dialog__header-copy">
      <span class="financial-transaction-detail-dialog__eyebrow">Detalle financiero</span>
      <h2>Detalle de transaccion</h2>
      <p>{{ transaction.concept }}</p>
    </div>

    <button mat-icon-button type="button" aria-label="Cerrar detalle financiero" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="financial-transaction-detail-dialog__body">
    <app-financial-transaction-detail-content [transaction]="transaction" />
  </div>

  <footer class="financial-transaction-detail-dialog__actions app-dialog__actions">
    <button mat-button class="app-secondary-button" type="button" (click)="close()">Cerrar</button>
    <div class="financial-transaction-detail-dialog__actions-group app-dialog__actions-group">
      <a mat-flat-button [routerLink]="['/financial-transactions', transaction.id, 'edit']" (click)="close()">Editar</a>
    </div>
  </footer>
</div>
