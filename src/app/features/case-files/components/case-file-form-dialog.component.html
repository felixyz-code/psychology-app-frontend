<div class="case-file-dialog">
  <div class="case-file-dialog__header">
    <h2>{{ getTitle() }}</h2>
    <p>{{ getSubtitle() }}</p>
  </div>

  <form class="case-file-dialog__form" [formGroup]="caseFileForm" (ngSubmit)="submit()">
    <div class="case-file-dialog__grid">
      <mat-form-field appearance="outline" class="case-file-dialog__full">
        <mat-label>Diagnóstico</mat-label>
        <textarea matInput formControlName="diagnosis" rows="4"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" class="case-file-dialog__full">
        <mat-label>Plan de tratamiento</mat-label>
        <textarea matInput formControlName="treatmentPlan" rows="5"></textarea>
      </mat-form-field>
    </div>

    @if (errorMessage()) {
      <p class="case-file-dialog__error" role="alert">{{ errorMessage() }}</p>
    }

    @if (isSaving()) {
      <div class="case-file-dialog__saving" aria-live="polite">
        <mat-spinner diameter="20" />
        <span>Guardando...</span>
      </div>
    }

    <div class="case-file-dialog__actions">
      <button mat-button type="button" (click)="cancel()" [disabled]="isSaving()">Cancelar</button>
      <button mat-flat-button type="submit" [disabled]="isSaving()">{{ getSubmitLabel() }}</button>
    </div>
  </form>
</div>
