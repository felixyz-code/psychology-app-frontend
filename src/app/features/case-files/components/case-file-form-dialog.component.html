<div class="case-file-dialog app-dialog">
  <div class="case-file-dialog__header app-dialog__header">
    <h2>{{ getTitle() }}</h2>
    <p>{{ getSubtitle() }}</p>
  </div>

  <form class="case-file-dialog__form app-dialog__form app-form" [formGroup]="caseFileForm" (ngSubmit)="submit()">
    <div class="case-file-dialog__section app-form-section">
      <div class="app-form-section__header">
        <h3>Resumen clinico base</h3>
        <p>Organiza el diagnostico y el plan de tratamiento con una lectura mas clara.</p>
      </div>

      <div class="case-file-dialog__grid app-dialog__grid app-form-grid">
        <mat-form-field appearance="outline" class="case-file-dialog__full app-form-field--full">
          <mat-label>Diagnostico</mat-label>
          <input matInput formControlName="diagnosis" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="case-file-dialog__full app-form-field--full">
          <mat-label>Plan de tratamiento</mat-label>
          <textarea matInput formControlName="treatmentPlan" rows="3"></textarea>
        </mat-form-field>
      </div>
    </div>

    @if (errorMessage()) {
      <p class="case-file-dialog__error app-dialog__error app-form-error" role="alert">{{ errorMessage() }}</p>
    }

    @if (isSaving()) {
      <div class="case-file-dialog__saving app-dialog__saving app-form-saving" aria-live="polite">
        <mat-spinner diameter="20" />
        <span>Guardando...</span>
      </div>
    }

    <div class="case-file-dialog__actions app-dialog__actions">
      <button mat-button type="button" (click)="cancel()" [disabled]="isSaving()">Cancelar</button>
      <div class="app-dialog__actions-group app-form-actions__group">
        <button mat-flat-button type="submit" [disabled]="isSaving()">{{ getSubmitLabel() }}</button>
      </div>
    </div>
  </form>
</div>
